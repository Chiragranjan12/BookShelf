version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bookmanager-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: bookmanager_db
      MYSQL_USER: ${DB_USERNAME:-bookuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bookpass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bookmanager-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://db:3306/bookmanager_db?useSSL=false&serverTimezone=UTC
      DB_USERNAME: ${DB_USERNAME:-bookuser}
      DB_PASSWORD: ${DB_PASSWORD:-bookpass}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
