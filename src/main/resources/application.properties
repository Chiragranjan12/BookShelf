# ── Server ──────────────────────────────────────────────
server.port=8080

# ── H2 In-Memory DB (dev default) ───────────────────────
spring.datasource.url=jdbc:h2:mem:bookmanager_db;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA ─────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# ── SQL Init — schema.sql creates tables, data.sql seeds rows ──
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ── Thymeleaf ───────────────────────────────────────────
spring.thymeleaf.cache=false

# ── Security (override in prod via env vars) ─────────────
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}

# ── CORS ────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ── Logging ─────────────────────────────────────────────
logging.level.com.bookmanager=INFO
logging.level.org.springframework.security=WARN

# ── OpenAPI / Swagger ────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Actuator ────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.app.name=BookShelf Manager
management.info.app.version=1.0.0
