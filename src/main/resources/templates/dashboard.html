<!DOCTYPE  html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - BookShelf Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-semibold">BookShelf Manager</h1>
                </div>
                <div class="flex items-center">
                    <a th:href="@{/logout}" class="text-gray-700 hover:text-gray-900">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow">
                <h3 class="text-lg font-medium text-gray-900">Total Books</h3>
                <p class="text-3xl font-bold text-indigo-600" th:text="${stats.total}">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow">
                <h3 class="text-lg font-medium text-gray-900">Currently Reading</h3>
                <p class="text-3xl font-bold text-blue-600" th:text="${stats.reading}">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow">
                <h3 class="text-lg font-medium text-gray-900">Completed</h3>
                <p class="text-3xl font-bold text-green-600" th:text="${stats.completed}">0</p>
            </div>
        </div>

        <div class="bg-white shadow rounded-lg">
            <div class="px-6 py-4 border-b">
                <h2 class="text-lg font-medium">Your Books</h2>
            </div>
            <div class="p-6">
                <div th:if="${books.empty}" class="text-center py-8">
                    <p class="text-gray-500">No books found. Add your first book!</p>
                </div>
                <div th:unless="${books.empty}" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div th:each="book : ${books}" class="bg-gray-50 p-4 rounded-lg">
                        <h3 class="font-semibold text-lg" th:text="${book.title}">Book Title</h3>
                        <p class="text-gray-600" th:text="${book.author}">Author</p>
                        <span class="inline-block px-2 py-1 text-sm rounded-full mt-2"
                              th:classappend="${book.status == 'reading'} ? 'bg-blue-100 text-blue-800' : 
                                             ${book.status == 'completed'} ? 'bg-green-100 text-green-800' : 
                                             'bg-gray-100 text-gray-800'"
                              th:text="${book.status}">Status</span>
                        <p th:if="${book.price}" class="text-green-600 font-medium mt-2" 
                           th:text="'$' + ${book.price}">Price</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
