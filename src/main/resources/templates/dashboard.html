<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - BookShelf Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">📚</span>
                    <h1 class="text-xl font-semibold text-gray-800">BookShelf Manager</h1>
                </div>
                <div class="flex items-center gap-4">
                    <a href="/swagger-ui.html" target="_blank"
                       class="text-sm text-indigo-600 hover:text-indigo-800">API Docs</a>
                    <a th:href="@{/logout}"
                       class="text-sm text-gray-600 hover:text-gray-900 border border-gray-300 px-3 py-1 rounded-lg">
                        Logout
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 text-center">
                <p class="text-3xl font-bold text-indigo-600" th:text="${stats['total']}">0</p>
                <p class="text-sm text-gray-500 mt-1">Total Books</p>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 text-center">
                <p class="text-3xl font-bold text-blue-600" th:text="${stats['READING']}">0</p>
                <p class="text-sm text-gray-500 mt-1">Reading</p>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 text-center">
                <p class="text-3xl font-bold text-green-600" th:text="${stats['COMPLETED']}">0</p>
                <p class="text-sm text-gray-500 mt-1">Completed</p>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 text-center">
                <p class="text-3xl font-bold text-yellow-500" th:text="${stats['WISHLIST']}">0</p>
                <p class="text-sm text-gray-500 mt-1">Wishlist</p>
            </div>
        </div>

        <!-- Books Table -->
        <div class="bg-white shadow-sm rounded-xl border border-gray-100">
            <div class="px-6 py-4 border-b flex justify-between items-center">
                <h2 class="text-lg font-semibold text-gray-800">Your Library</h2>
                <span class="text-sm text-gray-400" th:text="${books.size()} + ' books'">0 books</span>
            </div>
            <div class="p-6">
                <div th:if="${books.empty}" class="text-center py-12">
                    <p class="text-4xl mb-3">📖</p>
                    <p class="text-gray-500">No books yet. Use the React app to add your first book!</p>
                </div>
                <div th:unless="${books.empty}" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div th:each="book : ${books}"
                         class="bg-gray-50 p-4 rounded-xl border border-gray-100 hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start mb-2">
                            <span th:text="${book.status}"
                                  th:classappend="${book.status.name() == 'READING'} ? 'bg-blue-100 text-blue-800' :
                                                 (${book.status.name() == 'COMPLETED'} ? 'bg-green-100 text-green-800' :
                                                 'bg-yellow-100 text-yellow-800')"
                                  class="text-xs font-medium px-2 py-1 rounded-full">
                            </span>
                            <span th:if="${book.genre}"
                                  class="text-xs text-gray-400 bg-gray-200 px-2 py-1 rounded-full"
                                  th:text="${book.genre}">
                            </span>
                        </div>
                        <h3 class="font-semibold text-gray-800 mt-2" th:text="${book.title}">Title</h3>
                        <p class="text-sm text-gray-500" th:text="'by ' + ${book.author}">Author</p>

                        <!-- Reading progress bar -->
                        <div th:if="${book.readingProgressPercent != null}" class="mt-3">
                            <div class="flex justify-between text-xs text-gray-400 mb-1">
                                <span th:text="${book.currentPage} + ' / ' + ${book.totalPages} + ' pages'"></span>
                                <span th:text="${book.readingProgressPercent} + '%'"></span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-1.5">
                                <div class="bg-blue-500 h-1.5 rounded-full"
                                     th:style="'width: ' + ${book.readingProgressPercent} + '%'"></div>
                            </div>
                        </div>

                        <p th:if="${book.price}"
                           class="text-sm text-green-600 font-medium mt-2"
                           th:text="${book.currency} + ' ' + ${book.price}">Price</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
